<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calibration of AI-Based Automated Pediatric Dental Images</title>
    <style>
        /* Modern CSS resets for a seamless dashboard platform look */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050609;
            overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* 🌟 Premium High-Contrast Center-Aligned Corporate Header */
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px 30px;
            background-color: #0c0e17;
            border-bottom: 2px solid #d4af37;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
            position: relative;
            z-index: 10;
        }

        /* Small dynamic status sub-tag pinned neatly to the top center */
        header .lab-tag {
            color: #d4af37;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 6px;
        }

        header h1 {
            color: #ffffff;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: 1px;
            line-height: 1.3;
            margin: 0;
            text-transform: uppercase;
        }

        header .college-tag {
            color: #94a3b8;
            font-size: 0.95rem;
            font-weight: 500;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        /* Status Indicator Pill */
        header .status-indicator {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            color: #22c55e;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            border: 1px solid rgba(34, 197, 94, 0.3);
            background-color: rgba(34, 197, 94, 0.05);
            padding: 6px 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 🌟 Centered App Viewport Frame */
        .app-workspace-viewport {
            width: 100%;
            height: calc(100vh - 110px); /* Perfectly subtracts header size to prevent cutoff */
            background-color: #050609;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #050609;
        }

        /* Responsive scaling adjustment for smaller laptop displays */
        @media (max-width: 1024px) {
            header h1 { font-size: 1.3rem; }
            header .status-indicator { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="lab-tag">Team-14 Internship I</div>
        
        <div class="status-indicator">
            <span style="color: #22c55e;">●</span> SECURE CONNECTION LIVE
        </div>
    </header>

    <div class="app-workspace-viewport">
        <iframe src="https://saktthi-team-14.hf.space"></iframe>
    </div>

</body>
</html>
